    city_scope:
      - Boston
      - Washington, DC
    type: weather_api
    bronze_targets:
      - bronze_weather_hourly_raw
  - name: ticketmaster
    city_scope:
      - Boston
      - Washington, DC
    type: public_events_api
    bronze_targets:
